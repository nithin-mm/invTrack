version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory@123
      POSTGRES_DB: inventory_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    # No ports exposed externally to keep it secure/internal

  server:
    build: ./server
    environment:
      DATABASE_URL: "postgresql://inventory:inventory@123@db:5432/inventory_db?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "inventory-secret-key-2026"
    depends_on:
      - db
      - redis

  client:
    build: ./client
    ports:
      - "3333:3333"
    depends_on:
      - server

volumes:
  postgres_data:

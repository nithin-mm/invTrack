services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory@123
      POSTGRES_DB: inventory_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://inventory:inventory@123@db:5432/inventory_db?schema=public"
    depends_on:
      - db

  client:
    build: ./client
    ports:
      - "3333:3333"
    depends_on:
      - server

volumes:
  postgres_data:

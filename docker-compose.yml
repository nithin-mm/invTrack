version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory@123
      POSTGRES_DB: inventory_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    # Port 4000 is now internal only (accessed via client nginx)
    environment:
      DATABASE_URL: "postgresql://inventory:inventory@123@db:5432/inventory_db?schema=public"
      JWT_SECRET: "inventory-secret-key-2026"
    depends_on:
      - db

  client:
    build: ./client
    ports:
      - "3333:3333"
    depends_on:
      - server

volumes:
  postgres_data:
